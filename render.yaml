services:
  - type: web
    name: torn-hiring-scan
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --threads 4 --timeout 120
    envVars:
      - key: TORN_API_KEY
        sync: false
      - key: ADMIN_TOKEN
        generateValue: true
